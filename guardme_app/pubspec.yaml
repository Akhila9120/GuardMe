name: guardme_app
description: "GuardMe - Safety Tracking Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.0
  flutter_dotenv: ^5.1.0
  google_maps_flutter: ^2.6.1
  location: ^6.0.1
  flutter_polyline_points: ^2.0.0
  geolocator: ^11.0.0
  geocoding: ^2.0.5
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  alan_voice: ^4.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
